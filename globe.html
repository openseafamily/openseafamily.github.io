<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenSeaFamily — Globe Tour du Monde</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:'Courier New',monospace;}
#app{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
canvas{display:block;cursor:grab;}
canvas:active{cursor:grabbing;}
.header{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,.9),transparent);}
.logo{font-size:.85rem;letter-spacing:5px;text-transform:uppercase;color:#8dd4f0;}
.logo span{color:#f0a840;}
.subtitle{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:rgba(141,212,240,.4);}
#tooltip{position:fixed;pointer-events:none;z-index:200;background:rgba(5,15,30,.95);border:1px solid rgba(240,168,64,.4);padding:10px 16px;opacity:0;transition:opacity .2s;min-width:180px;}
.tt-step{font-size:.52rem;letter-spacing:3px;text-transform:uppercase;color:#f0a840;margin-bottom:3px;}
.tt-name{font-size:.95rem;font-weight:700;color:#fff;font-family:'Georgia',serif;margin-bottom:2px;}
.tt-desc{font-size:.68rem;color:rgba(141,212,240,.7);}
#stop-list{position:fixed;left:20px;top:50%;transform:translateY(-50%);z-index:100;max-height:70vh;overflow-y:auto;scrollbar-width:none;}
#stop-list::-webkit-scrollbar{display:none;}
.stop-item{display:flex;align-items:center;gap:8px;padding:5px 10px;cursor:pointer;transition:all .2s;border-left:2px solid transparent;}
.stop-item:hover{border-left-color:rgba(141,212,240,.4);}
.stop-item.active{border-left-color:#f0a840;}
.stop-item.active .si-dot{background:#f0a840;box-shadow:0 0 6px #f0a840;}
.si-dot{width:6px;height:6px;border-radius:50%;background:rgba(141,212,240,.3);flex-shrink:0;}
.si-n{font-size:.6rem;letter-spacing:.5px;color:rgba(245,232,206,.6);}
.stop-item.active .si-n{color:#f0a840;}
#stats-panel{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:12px;}
.stat{background:rgba(5,15,30,.8);border:1px solid rgba(141,212,240,.12);padding:12px 16px;text-align:center;min-width:100px;}
.stat-n{font-family:'Georgia',serif;font-size:1.5rem;font-weight:700;color:#f0a840;line-height:1;}
.stat-l{font-size:.5rem;letter-spacing:2px;text-transform:uppercase;color:rgba(141,212,240,.4);margin-top:2px;}
#controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:12px;background:rgba(5,15,30,.9);border:1px solid rgba(141,212,240,.15);padding:10px 20px;}
.c-btn{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:#faf7f2;background:transparent;border:1px solid rgba(141,212,240,.2);padding:6px 14px;cursor:pointer;transition:all .2s;}
.c-btn:hover,.c-btn.on{border-color:#8dd4f0;color:#8dd4f0;}
.c-btn.on{background:rgba(141,212,240,.1);}
.c-sep{width:1px;height:20px;background:rgba(141,212,240,.12);}
.c-info{font-size:.58rem;letter-spacing:1.5px;color:rgba(141,212,240,.35);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.prog{width:100px;height:2px;background:rgba(255,255,255,.07);}
.prog-f{height:100%;background:linear-gradient(to right,#1a5fa8,#f0a840);width:0%;transition:width .1s;}
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s;}
#loading.hidden{opacity:0;pointer-events:none;}
.l-boat{font-size:3rem;animation:bob 1.5s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.l-txt{font-size:.65rem;letter-spacing:4px;text-transform:uppercase;color:rgba(141,212,240,.5);margin-top:16px;}
@media(max-width:700px){
  #stop-list{display:none;}
  #stats-panel{right:10px;gap:8px;}
  .stat{min-width:70px;padding:8px 10px;}
  .stat-n{font-size:1.1rem;}
  .header{padding:14px 16px;}
  .subtitle{display:none;}
}
</style>
</head>
<body>
<div id="loading"><div class="l-boat">⛵</div><div class="l-txt">Chargement de la carte du monde...</div></div>
<div id="app"><canvas id="c"></canvas></div>
<div class="header">
  <div class="logo">Open<span>Sea</span>Family</div>
  <div class="subtitle">Tour du Monde à la Voile · Les Bataillard · Bourg d'Oisans</div>
</div>
<div id="tooltip"><div class="tt-step" id="tt-step"></div><div class="tt-name" id="tt-name"></div><div class="tt-desc" id="tt-desc"></div></div>
<div id="stop-list"></div>
<div id="stats-panel">
  <div class="stat"><div class="stat-n">35K</div><div class="stat-l">Milles</div></div>
  <div class="stat"><div class="stat-n" id="s-stops">0</div><div class="stat-l">Escales</div></div>
  <div class="stat"><div class="stat-n">3</div><div class="stat-l">Années</div></div>
  <div class="stat"><div class="stat-n">4</div><div class="stat-l">Marins</div></div>
</div>
<div id="controls">
  <button class="c-btn on" id="b-play" onclick="togglePlay()">⏸ Pause</button>
  <button class="c-btn" onclick="resetAnim()">↺ Rejouer</button>
  <div class="c-sep"></div>
  <button class="c-btn" onclick="setSpd(.5,event)">×½</button>
  <button class="c-btn on" id="b-s1" onclick="setSpd(1,event)">×1</button>
  <button class="c-btn" onclick="setSpd(2,event)">×2</button>
  <div class="c-sep"></div>
  <div class="prog"><div class="prog-f" id="pf"></div></div>
  <div class="c-info" id="c-info">Prêt à naviguer...</div>
</div>

<script>
// ══════════════════════════════════════════════════
// ESCALES DU TOUR DU MONDE
// ══════════════════════════════════════════════════
const STOPS=[
  {n:"Bourg d'Oisans", d:"France · Départ du rêve ⚓",           lat:45.05,lon:6.03},
  {n:"Marseille",      d:"France · Méditerranée",                 lat:43.30,lon:5.37},
  {n:"Barcelone",      d:"Espagne · Costa Brava",                 lat:41.38,lon:2.18},
  {n:"Gibraltar",      d:"Détroit · Entrée dans l'Atlantique",    lat:36.14,lon:-5.35},
  {n:"Lisbonne",       d:"Portugal · Dernière Europe",            lat:38.72,lon:-9.14},
  {n:"Canaries",       d:"Espagne · Base de départ transatlantique",lat:28.29,lon:-15.63},
  {n:"Cap-Vert",       d:"Archipel · Alizés favorables",          lat:16.00,lon:-24.00},
  {n:"Martinique",     d:"Caraïbes · Première traversée 🎉",      lat:14.64,lon:-61.02},
  {n:"Guadeloupe",     d:"Antilles · Mers turquoise",             lat:16.27,lon:-61.55},
  {n:"Grenadines",     d:"Caraïbes · Mouillages de rêve",         lat:12.90,lon:-61.27},
  {n:"Panama",         d:"Canal de Panama · Passage Pacifique",   lat:8.99,lon:-79.52},
  {n:"Galápagos",      d:"Équateur · Faune unique 🐢",            lat:-0.95,lon:-90.97},
  {n:"Marquises",      d:"Polynésie française · Premier atoll",   lat:-9.00,lon:-139.00},
  {n:"Bora Bora",      d:"Polynésie · Lagon mythique 💎",         lat:-16.50,lon:-151.74},
  {n:"Fidji",          d:"Pacifique Sud · Archipel volcanique",   lat:-17.71,lon:178.07},
  {n:"Australie",      d:"Brisbane · Grande Barrière 🐠",         lat:-27.47,lon:153.03},
  {n:"Bali",           d:"Indonésie · Passage vers l'Indien",     lat:-8.34,lon:115.09},
  {n:"Maldives",       d:"Océan Indien · Atolls de corail 🪸",    lat:3.20,lon:73.22},
  {n:"Madagascar",     d:"Afrique · Faune exceptionnelle",        lat:-20.00,lon:47.00},
  {n:"La Réunion",     d:"France · Île volcanique 🌋",            lat:-21.11,lon:55.54},
  {n:"Cap Town",       d:"Cap de Bonne-Espérance 🌍",             lat:-33.92,lon:18.42},
  {n:"Açores",         d:"Portugal · Dernier archipel avant la France",lat:37.74,lon:-25.67},
  {n:"Brest",          d:"France · Bretagne · Retour approche",   lat:48.39,lon:-4.49},
  {n:"Bourg d'Oisans", d:"France · Mission accomplie ! ⚓🎉",     lat:45.05,lon:6.03},
];

// ══════════════════════════════════════════════════
// CANVAS + D3 GEO ORTHOGRAPHIC
// ══════════════════════════════════════════════════
const canvas=document.getElementById('c');
const context=canvas.getContext('2d');
let W,H,R;
let rotX=-15,rotY=40; // rotation initiale (lambda, phi) en degrés pour d3
let drag=false,lx=0,ly=0;
let animT=0,spd=1,paused=false,autoR=true;
let worldLand=null, worldBorders=null;
let projection, path;

function buildProjection(){
  projection=d3.geoOrthographic()
    .translate([W/2,H/2])
    .scale(R)
    .rotate([rotX,rotY,0])
    .clipAngle(90);
  path=d3.geoPath(projection).context(context);
}

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  R=Math.min(W,H)*0.40;
  if(projection){
    projection.translate([W/2,H/2]).scale(R);
  }
}
window.addEventListener('resize',()=>{resize();draw();});

// ══════════════════════════════════════════════════
// PROJECTION — on utilise directement projection() de D3
// pour TOUT (continents ET points d'escale) afin que
// la rotation reste parfaitement synchronisée
// ══════════════════════════════════════════════════
function projectPoint(lat,lon){
  const coords=projection([lon,lat]); // d3 attend [lon, lat]
  if(!coords)return{x:0,y:0,v:false};
  // Vérifier la visibilité (face avant du globe) via le produit scalaire
  const rotation=projection.rotate();
  const lambda=(lon+rotation[0])*Math.PI/180;
  const phi=lat*Math.PI/180;
  const phi0=rotation[1]*Math.PI/180;
  const cosc=Math.sin(-phi0)*Math.sin(phi)+Math.cos(-phi0)*Math.cos(phi)*Math.cos(lambda);
  return{
    x:coords[0],
    y:coords[1],
    v:cosc>0.001
  };
}

// ══════════════════════════════════════════════════
// DESSIN
// ══════════════════════════════════════════════════
function drawScene(){
  context.clearRect(0,0,W,H);

  // Océan (sphère)
  const g=context.createRadialGradient(W/2-R*.35,H/2-R*.35,R*.05,W/2,H/2,R);
  g.addColorStop(0,'#1e6bb8');
  g.addColorStop(0.45,'#0f3d72');
  g.addColorStop(0.8,'#081d40');
  g.addColorStop(1,'#040f22');
  context.beginPath();
  context.arc(W/2,H/2,R,0,Math.PI*2);
  context.fillStyle=g;
  context.fill();

  // Mise à jour rotation D3
  projection.rotate([rotX,rotY,0]);

  // Graticule (grille)
  context.beginPath();
  path(d3.geoGraticule10());
  context.strokeStyle='rgba(255,255,255,0.08)';
  context.lineWidth=0.5;
  context.stroke();

  // Continents réels (Natural Earth via world-atlas)
  if(worldLand){
    context.beginPath();
    path(worldLand);
    context.fillStyle='rgba(38,112,60,0.9)';
    context.fill();
    context.strokeStyle='rgba(70,150,85,0.6)';
    context.lineWidth=0.6;
    context.stroke();
  }
  // Frontières des pays
  if(worldBorders){
    context.beginPath();
    path(worldBorders);
    context.strokeStyle='rgba(20,60,30,0.5)';
    context.lineWidth=0.4;
    context.stroke();
  }

  // Bordure sphère
  context.beginPath();
  context.arc(W/2,H/2,R,0,Math.PI*2);
  context.strokeStyle='rgba(141,212,240,0.35)';
  context.lineWidth=1.5;
  context.stroke();

  // Atmosphère
  const atmo=context.createRadialGradient(W/2,H/2,R*.88,W/2,H/2,R*1.18);
  atmo.addColorStop(0,'rgba(59,155,214,0.22)');
  atmo.addColorStop(.5,'rgba(59,155,214,0.06)');
  atmo.addColorStop(1,'transparent');
  context.beginPath();
  context.arc(W/2,H/2,R*1.18,0,Math.PI*2);
  context.fillStyle=atmo;
  context.fill();

  // Route fantôme (tous les segments, en pointillés)
  context.setLineDash([3,8]);
  context.strokeStyle='rgba(240,168,64,0.25)';
  context.lineWidth=1.5;
  context.beginPath();
  let f=true;
  for(const s of STOPS){
    const p=projectPoint(s.lat,s.lon);
    if(!p.v){f=true;continue;}
    f?context.moveTo(p.x,p.y):context.lineTo(p.x,p.y);
    f=false;
  }
  context.stroke();
  context.setLineDash([]);

  // Route animée dorée
  const total=STOPS.length-1,drawn=animT*total;
  context.strokeStyle='#f0a840';
  context.lineWidth=2.8;
  context.shadowColor='rgba(240,168,64,0.8)';
  context.shadowBlur=10;
  context.beginPath();
  f=true;
  for(let i=0;i<=Math.floor(drawn);i++){
    const p=projectPoint(STOPS[i].lat,STOPS[i].lon);
    if(!p.v){f=true;continue;}
    f?context.moveTo(p.x,p.y):context.lineTo(p.x,p.y);
    f=false;
  }
  const idx=Math.floor(drawn);
  if(idx<total){
    const fr=drawn-idx,a=STOPS[idx],b=STOPS[idx+1];
    const p=projectPoint(a.lat+(b.lat-a.lat)*fr,a.lon+(b.lon-a.lon)*fr);
    if(p.v)context.lineTo(p.x,p.y);
  }
  context.stroke();
  context.shadowBlur=0;

  // Points escale
  STOPS.forEach((s,i)=>{
    if(i>drawn+0.5)return;
    const p=projectPoint(s.lat,s.lon);
    if(!p.v)return;
    const cur=Math.abs(i-drawn)<0.9;
    if(cur){
      const h=context.createRadialGradient(p.x,p.y,0,p.x,p.y,24);
      h.addColorStop(0,'rgba(240,168,64,0.5)');
      h.addColorStop(1,'transparent');
      context.beginPath();
      context.arc(p.x,p.y,24,0,Math.PI*2);
      context.fillStyle=h;
      context.fill();
    }
    context.beginPath();
    context.arc(p.x,p.y,cur?5.5:3.5,0,Math.PI*2);
    context.fillStyle=cur?'#fff':(i===0||i===STOPS.length-1?'#f0a840':'rgba(255,255,255,0.9)');
    if(cur){context.shadowColor='rgba(255,255,255,0.9)';context.shadowBlur=10;}
    context.fill();
    context.shadowBlur=0;
    if(cur||(i===0||i===STOPS.length-1)){
      context.fillStyle=cur?'#fff':'rgba(240,168,64,0.9)';
      context.font=(cur?'bold ':'')+(cur?11:9)+'px Courier New';
      context.textAlign=p.x>W/2?'right':'left';
      const ox=p.x>W/2?-10:10;
      context.fillText(s.n,p.x+ox,p.y-9);
    }
  });

  // Voilier
  const a2=STOPS[Math.min(idx,total-1)],b2=STOPS[Math.min(idx+1,total)];
  const fr2=(drawn-idx);
  const blat=a2.lat+(b2.lat-a2.lat)*fr2,blon=a2.lon+(b2.lon-a2.lon)*fr2;
  const bp=projectPoint(blat,blon);
  if(bp.v){
    context.font='20px serif';
    context.textAlign='center';
    context.shadowColor='rgba(255,255,255,0.7)';
    context.shadowBlur=14;
    context.fillText('⛵',bp.x,bp.y-5);
    context.shadowBlur=0;
  }

  // Reflet
  const sh=context.createRadialGradient(W/2-R*.4,H/2-R*.4,0,W/2,H/2,R);
  sh.addColorStop(0,'rgba(255,255,255,0.08)');
  sh.addColorStop(.5,'transparent');
  context.beginPath();
  context.arc(W/2,H/2,R,0,Math.PI*2);
  context.fillStyle=sh;
  context.fill();
}

// ══════════════════════════════════════════════════
// BOUCLE D'ANIMATION
// ══════════════════════════════════════════════════
let lt=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lt)/1000,.05);lt=ts;
  if(!paused){
    animT=Math.min(animT+dt*.01*spd,1);
    if(autoR&&!drag)rotX+=dt*1.5; // deg/s
  }
  draw();
  const total=STOPS.length-1;
  const idx=Math.min(Math.floor(animT*total),total-1);
  document.getElementById('pf').style.width=(animT*100)+'%';
  document.getElementById('s-stops').textContent=idx+1;
  document.getElementById('c-info').textContent=STOPS[idx].n;
  document.querySelectorAll('.stop-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  if(animT>=1&&!paused){paused=true;document.getElementById('b-play').textContent='▶ Rejouer';}
}
function draw(){drawScene();}

// ══════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════
canvas.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;autoR=false;});
canvas.addEventListener('mousemove',e=>{
  if(drag){
    rotX+=(e.clientX-lx)*0.25;
    rotY-=(e.clientY-ly)*0.25;
    rotY=Math.max(-90,Math.min(90,rotY));
    lx=e.clientX;ly=e.clientY;
  }
  const total=STOPS.length-1,drawn=animT*total;
  let found=false;
  STOPS.forEach((s,i)=>{
    if(i>drawn+.5)return;
    const p=projectPoint(s.lat,s.lon);if(!p.v)return;
    const dx=e.clientX-p.x,dy=e.clientY-p.y;
    if(dx*dx+dy*dy<144){
      const tt=document.getElementById('tooltip');
      document.getElementById('tt-step').textContent='Escale '+(i+1)+' / '+STOPS.length;
      document.getElementById('tt-name').textContent=s.n;
      document.getElementById('tt-desc').textContent=s.d;
      tt.style.left=(e.clientX+16)+'px';tt.style.top=(e.clientY-20)+'px';tt.style.opacity='1';found=true;
    }
  });
  if(!found)document.getElementById('tooltip').style.opacity='0';
});
canvas.addEventListener('mouseup',()=>drag=false);
canvas.addEventListener('mouseleave',()=>{drag=false;document.getElementById('tooltip').style.opacity='0';});
canvas.addEventListener('touchstart',e=>{drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;autoR=false;},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(!drag)return;
  rotX+=(e.touches[0].clientX-lx)*0.25;
  rotY-=(e.touches[0].clientY-ly)*0.25;
  rotY=Math.max(-90,Math.min(90,rotY));
  lx=e.touches[0].clientX;ly=e.touches[0].clientY;
},{passive:true});
canvas.addEventListener('touchend',()=>drag=false);

function togglePlay(){if(animT>=1){resetAnim();return;}paused=!paused;const b=document.getElementById('b-play');b.textContent=paused?'▶ Play':'⏸ Pause';b.classList.toggle('on',!paused);}
function resetAnim(){animT=0;paused=false;rotX=-15;rotY=40;autoR=true;document.getElementById('b-play').textContent='⏸ Pause';document.getElementById('b-play').classList.add('on');}
function setSpd(s,ev){spd=s;document.querySelectorAll('.c-btn').forEach(b=>{if(b.textContent.includes('×'))b.classList.remove('on');});if(ev&&ev.target)ev.target.classList.add('on');}

const sl=document.getElementById('stop-list');
STOPS.forEach((s,i)=>{
  const d=document.createElement('div');d.className='stop-item';
  d.onclick=()=>{animT=i/(STOPS.length-1);rotX=-s.lon;rotY=s.lat;};
  d.innerHTML='<div class="si-dot"></div><div class="si-n">'+s.n+'</div>';
  sl.appendChild(d);
});

// ══════════════════════════════════════════════════
// CHARGEMENT DES DONNÉES GÉOGRAPHIQUES RÉELLES
// ══════════════════════════════════════════════════
resize();
buildProjection();

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world=>{
  worldLand=topojson.feature(world,world.objects.land);
  worldBorders=topojson.mesh(world,world.objects.countries,(a,b)=>a!==b);
  document.getElementById('loading').classList.add('hidden');
  requestAnimationFrame(loop);
}).catch(err=>{
  console.error('Erreur chargement carte:',err);
  document.querySelector('.l-txt').textContent='Erreur de chargement — vérifiez votre connexion internet';
});
</script>
</body>
</html>
